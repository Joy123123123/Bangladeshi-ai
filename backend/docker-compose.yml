version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bangladeshi_ai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - bangladeshi_ai_net

  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bangladeshi_ai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bangladeshi_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bangladeshi_ai_net

  # ── Redis Cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bangladeshi_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bangladeshi_ai_net

volumes:
  postgres_data:
  redis_data:

networks:
  bangladeshi_ai_net:
    driver: bridge
